services:
  db:
    image: postgres:16.14-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kurilka}
      POSTGRES_USER: ${POSTGRES_USER:-kurilka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kurilka} -d ${POSTGRES_DB:-kurilka}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [data]
  redis:
    image: redis:7.4.9-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    # Redis holds OIDC exchanges, rate-limit counters, and the outbox lock.
    # Keep it private and require authentication even in the local stack so a
    # missing production override cannot accidentally create an open instance.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change-me}"]
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"${REDIS_PASSWORD:-change-me}\" ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [data]
  migrate:
    image: luma-api:local
    build: ./apps/api
    command: alembic upgrade head
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kurilka:change-me@db:5432/kurilka}
    depends_on:
      db:
        condition: service_healthy
    networks: [data]
  api:
    image: luma-api:local
    build: ./apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kurilka:change-me@db:5432/kurilka}
      REDIS_URL: ${REDIS_URL:-redis://:change-me@redis:6379/0}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-http://localhost:5173}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      PUBLIC_LAUNCH_ENABLED: ${PUBLIC_LAUNCH_ENABLED:-false}
      SESSION_SECRET: ${SESSION_SECRET:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_AUTH_MAX_AGE_SECONDS: ${TELEGRAM_AUTH_MAX_AGE_SECONDS:-900}
      TELEGRAM_OIDC_CLIENT_ID: ${TELEGRAM_OIDC_CLIENT_ID:-}
      TELEGRAM_OIDC_CLIENT_SECRET: ${TELEGRAM_OIDC_CLIENT_SECRET:-}
      TELEGRAM_OIDC_REDIRECT_URI: ${TELEGRAM_OIDC_REDIRECT_URI:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:support@example.com}
      CONTENT_REVIEW_STATUS: ${CONTENT_REVIEW_STATUS:-draft}
      CONTENT_APPROVED_DIGEST: ${CONTENT_APPROVED_DIGEST:-}
      CONTENT_CATALOGUE_DIGEST: ${CONTENT_CATALOGUE_DIGEST:-}
      LEGAL_DOCUMENTS_STATUS: ${LEGAL_DOCUMENTS_STATUS:-template}
      LEGAL_DOCUMENTS_VERSION: ${LEGAL_DOCUMENTS_VERSION:-}
      LEGAL_DOCUMENTS_DIGEST: ${LEGAL_DOCUMENTS_DIGEST:-}
      RISK_ENGINE_VERSION: ${RISK_ENGINE_VERSION:-rules_v1}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
      ACQUISITION_SOURCES: ${ACQUISITION_SOURCES:-}
      PROXY_SHARED_SECRET: ${PROXY_SHARED_SECRET:-}
      OUTBOX_RETENTION_DAYS: ${OUTBOX_RETENTION_DAYS:-30}
      DELIVERY_RETENTION_DAYS: ${DELIVERY_RETENTION_DAYS:-90}
      ANALYTICS_RETENTION_DAYS: ${ANALYTICS_RETENTION_DAYS:-180}
      FEEDBACK_RETENTION_DAYS: ${FEEDBACK_RETENTION_DAYS:-365}
    ports: ["8000:8000"]
    healthcheck:
      # Readiness, not mere process liveness: do not expose the app through the
      # edge while Postgres or Redis is unavailable.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready')"]
      interval: 10s
      timeout: 3s
      retries: 12
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    # API exchanges Telegram OIDC codes and therefore needs outbound access,
    # but it cannot be reached from the stateful data network.
    networks: [app, data, egress]
  web:
    image: luma-web:local
    build: ./apps/web
    ports: ["5173:80"]
    depends_on: [api]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
    networks: [edge, app]
  worker:
    image: luma-api:local
    build: ./apps/api
    command: python -m app.worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://kurilka:change-me@db:5432/kurilka}
      REDIS_URL: ${REDIS_URL:-redis://:change-me@redis:6379/0}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBAPP_URL: ${TELEGRAM_WEBAPP_URL:-http://localhost:5173}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      APP_ENVIRONMENT: ${APP_ENVIRONMENT:-development}
      PUBLIC_LAUNCH_ENABLED: ${PUBLIC_LAUNCH_ENABLED:-false}
      SESSION_SECRET: ${SESSION_SECRET:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:support@example.com}
      CONTENT_REVIEW_STATUS: ${CONTENT_REVIEW_STATUS:-draft}
      CONTENT_APPROVED_DIGEST: ${CONTENT_APPROVED_DIGEST:-}
      CONTENT_CATALOGUE_DIGEST: ${CONTENT_CATALOGUE_DIGEST:-}
      LEGAL_DOCUMENTS_STATUS: ${LEGAL_DOCUMENTS_STATUS:-template}
      LEGAL_DOCUMENTS_VERSION: ${LEGAL_DOCUMENTS_VERSION:-}
      LEGAL_DOCUMENTS_DIGEST: ${LEGAL_DOCUMENTS_DIGEST:-}
      RISK_ENGINE_VERSION: ${RISK_ENGINE_VERSION:-rules_v1}
      PROXY_SHARED_SECRET: ${PROXY_SHARED_SECRET:-}
      OUTBOX_RETENTION_DAYS: ${OUTBOX_RETENTION_DAYS:-30}
      DELIVERY_RETENTION_DAYS: ${DELIVERY_RETENTION_DAYS:-90}
      ANALYTICS_RETENTION_DAYS: ${ANALYTICS_RETENTION_DAYS:-180}
      FEEDBACK_RETENTION_DAYS: ${FEEDBACK_RETENTION_DAYS:-365}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    # Notification delivery calls Telegram and Web Push endpoints. Keep this
    # egress path separate from the private database/Redis network.
    networks: [data, egress]
volumes:
  postgres_data:
networks:
  # Only the public proxy joins edge. Application traffic is separated from
  # stateful services, which are unreachable from Caddy and the static web app.
  edge:
  app:
  egress:
  data:
    internal: true
