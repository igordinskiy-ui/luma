name: CI
on:
  push:
  pull_request:
  workflow_dispatch:

# CI only needs the repository contents.  Keep the token read-only so a test
# or a compromised dependency cannot write back to the repository.
permissions:
  contents: read

# A newer revision supersedes an in-flight run for the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults: { run: { working-directory: apps/api } }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { persist-credentials: false }
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            apps/api/requirements.txt
            apps/api/requirements-test.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt -r requirements-test.txt
      - run: python -m pip install pip-audit
      - run: pip-audit -r requirements.txt -r requirements-test.txt
      - run: python -m compileall -q app tests
      - run: python ../../scripts/check_ci_pins.py
      - run: python ../../scripts/content_manifest.py
      - run: python ../../scripts/legal_manifest.py
      - run: python -c "from app.main import app; assert app.routes"
      - run: python -m alembic upgrade head
      - run: python -m pytest -q
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { persist-credentials: false }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: '22', cache: 'npm', cache-dependency-path: apps/web/package-lock.json }
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:run
  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { persist-credentials: false }
      - run: docker compose config --quiet
      - name: Validate production Compose overlay
        env:
          DOMAIN: ci.example.test
          PROXY_SHARED_SECRET: ci-test-proxy-secret-at-least-32-characters
          REDIS_PASSWORD: ci-test-redis-password-at-least-32-characters
          REDIS_URL: redis://:ci-test-redis-password-at-least-32-characters@redis:6379/0
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
      - name: Build production images
        run: |
          docker compose build db api worker web
          docker build -t luma-caddy:local ./apps/caddy
          docker build -f apps/backup/Dockerfile -t luma-backup:local .
      - name: Validate hardened runtime contracts
        run: |
          test "$(docker image inspect luma-postgres:local --format '{{.Config.User}}')" = "postgres"
          docker run --rm --entrypoint sh luma-postgres:local -c 'test ! -e /usr/local/bin/gosu'
          test "$(docker image inspect luma-caddy:local --format '{{.Config.User}}')" = "caddy"
          docker run --rm --entrypoint sh luma-caddy:local -c 'test ! -e /usr/bin/curl && test ! -e /usr/lib/libcurl.so.4'
          docker run --rm --entrypoint sh luma-caddy:local -c 'test -z "$(getcap /usr/bin/caddy)"'
          docker run --rm luma-caddy:local caddy version | grep '^v2.11.4 '
          caddy_data="luma-ci-caddy-data-${GITHUB_RUN_ID}"
          caddy_config="luma-ci-caddy-config-${GITHUB_RUN_ID}"
          docker volume create "$caddy_data"
          docker volume create "$caddy_config"
          trap 'docker volume rm "$caddy_data" "$caddy_config" >/dev/null' EXIT
          docker run --rm --user 0:0 --entrypoint sh -v "$caddy_data:/data" -v "$caddy_config:/config" luma-caddy:local -c 'touch /data/root-owned /config/root-owned; chmod 600 /data/root-owned /config/root-owned'
          docker run --rm --init --user 0:0 --read-only --tmpfs /tmp:size=32m --cap-drop ALL --cap-add CHOWN --cap-add SETUID --cap-add SETGID --sysctl net.ipv4.ip_unprivileged_port_start=0 -v "$caddy_data:/data" -v "$caddy_config:/config" luma-caddy:local sh -c 'test "$(id -u)" = 1000; grep -Eq "^NoNewPrivs:[[:space:]]+1" /proc/$$/status; echo ok >> /data/root-owned; echo ok >> /config/root-owned'
          test "$(docker image inspect luma-backup:local --format '{{.Config.User}}')" = "postgres"
          docker run --rm --entrypoint sh luma-backup:local -c 'test ! -e /usr/local/bin/gosu; test -x /usr/local/bin/backup-postgres; test -x /usr/local/bin/restore-drill; sh -n /usr/local/bin/backup-postgres; sh -n /usr/local/bin/restore-drill'
      - name: Run isolated backup and restore drill
        run: bash scripts/backup_restore_smoke.sh
      - name: Validate reverse-proxy configuration
        env:
          DOMAIN: ci.example.test
          PROXY_SHARED_SECRET: ci-test-proxy-secret-at-least-32-characters
        run: |
          docker run --rm -e DOMAIN -e PROXY_SHARED_SECRET -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro" luma-caddy:local caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
          docker run --rm -v "$PWD/apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro" nginx:1.31.2-alpine3.23@sha256:54f2a904c251d5a34adf545a72d32515a15e08418dae0266e23be2e18c66fefa nginx -t
      - name: Scan API image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: luma-api:local
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - name: Scan web image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: luma-web:local
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - name: Scan PostgreSQL image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: luma-postgres:local
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - name: Scan Redis image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: redis:7.4.9-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - name: Scan Caddy image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: luma-caddy:local
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - name: Scan backup tool image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: luma-backup:local
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  repository-security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { persist-credentials: false, fetch-depth: 0 }
      - name: Scan filesystem dependencies, config and secrets
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  deploy-production:
    needs: [api, web, containers, repository-security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.LUMA_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Deploy the tested revision
        env:
          DEPLOY_HOST: ${{ secrets.LUMA_DEPLOY_HOST }}
          DEPLOY_KEY: ${{ secrets.LUMA_DEPLOY_KEY }}
          KNOWN_HOSTS: ${{ secrets.LUMA_DEPLOY_KNOWN_HOSTS }}
          EVIDENCE_REQUIRED: ${{ vars.LUMA_DEPLOY_EVIDENCE_REQUIRED }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts
          deploy_output="$(ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o StrictHostKeyChecking=yes "luma-deploy@$DEPLOY_HOST" "$GITHUB_SHA")"
          printf '%s\n' "$deploy_output"
          evidence_pattern="^LUMA_DEPLOY_EVIDENCE revision=${GITHUB_SHA} previous=(unknown|[0-9a-f]{40}) caddy_uid=1000 no_new_privs=1 health=200 ready=200 synthetic=(passed|not_configured)$"
          if ! printf '%s\n' "$deploy_output" | grep -Eq "$evidence_pattern"; then
            echo "::warning::VPS deploy runner did not return the machine-readable edge/smoke evidence contract"
            if [ "$EVIDENCE_REQUIRED" = "true" ]; then
              exit 1
            fi
          fi
