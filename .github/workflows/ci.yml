name: CI
on:
  push:
  pull_request:
  workflow_dispatch:

# CI only needs the repository contents.  Keep the token read-only so a test
# or a compromised dependency cannot write back to the repository.
permissions:
  contents: read

# A newer revision supersedes an in-flight run for the same branch/PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults: { run: { working-directory: apps/api } }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { persist-credentials: false }
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt pytest
      - run: python -m pip install pip-audit
      - run: pip-audit -r requirements.txt
      - run: python -m compileall -q app tests
      - run: python ../../scripts/check_ci_pins.py
      - run: python ../../scripts/content_manifest.py
      - run: python ../../scripts/legal_manifest.py
      - run: python -c "from app.main import app; assert app.routes"
      - run: python -m alembic upgrade head
      - run: python -m pytest -q
  web:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { persist-credentials: false }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: '22', cache: 'npm', cache-dependency-path: apps/web/package-lock.json }
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:run
  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { persist-credentials: false }
      - run: docker compose config --quiet
      - name: Validate production Compose overlay
        env:
          DOMAIN: ci.example.test
          PROXY_SHARED_SECRET: ci-test-proxy-secret-at-least-32-characters
          REDIS_PASSWORD: ci-test-redis-password-at-least-32-characters
          REDIS_URL: redis://:ci-test-redis-password-at-least-32-characters@redis:6379/0
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
      - name: Validate reverse-proxy configuration
        env:
          DOMAIN: ci.example.test
          PROXY_SHARED_SECRET: ci-test-proxy-secret-at-least-32-characters
        run: |
          docker run --rm -e DOMAIN -e PROXY_SHARED_SECRET -v "$PWD/deploy/Caddyfile:/etc/caddy/Caddyfile:ro" caddy:2.8.4-alpine caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
          docker run --rm -v "$PWD/apps/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro" nginx:1.27.3-alpine nginx -t
      - run: docker compose build api worker web
      - name: Scan API image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: kurilka-api:local
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
      - name: Scan web image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: kurilka-web:local
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

  repository-security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { persist-credentials: false, fetch-depth: 0 }
      - name: Scan filesystem dependencies, config and secrets
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'
