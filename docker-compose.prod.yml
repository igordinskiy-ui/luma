services:
  db:
    ports: !reset []
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }
  redis:
    ports: !reset []
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD to a strong value}
  migrate:
    init: true
    read_only: true
    tmpfs: ["/tmp:size=64m"]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
  api:
    ports: !reset []
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs: ["/tmp:size=64m"]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 512M }
    environment:
      APP_ENVIRONMENT: production
      # The password must be URL-encoded and match REDIS_PASSWORD.
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL with the URL-encoded REDIS_PASSWORD}
  web:
    ports: !reset []
    restart: unless-stopped
    read_only: true
    tmpfs: ["/var/cache/nginx:uid=101,gid=101,mode=0750,size=32m", "/tmp:uid=101,gid=101,mode=0750,size=4m"]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 128M }
  worker:
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs: ["/tmp:size=64m"]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits: { cpus: "0.75", memory: 384M }
    environment:
      APP_ENVIRONMENT: production
      REDIS_URL: ${REDIS_URL:?Set REDIS_URL with the URL-encoded REDIS_PASSWORD}
  caddy:
    image: caddy:2.8.4-alpine
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs: ["/tmp:size=32m"]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 192M }
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN to the public hostname}
      PROXY_SHARED_SECRET: ${PROXY_SHARED_SECRET:?Set PROXY_SHARED_SECRET}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    networks: [edge, app]
volumes:
  caddy_data:
  caddy_config:
